function makeDefaultPlayer(num) {
  const stats = {}; STATS.forEach(s=>(stats[s]=0));
  const abilities = {}; ABILITIES.forEach(a=>(abilities[a.id]=false));
  return { name:`Delegate ${num}`, continent:"Merra", views:0, injury:0, baseDice:{...stats}, bloodiedStats:[], breakingStats:[], abilities, photo:null, inventory:[] };
}

function makeDefaultGMState() {
  const delegates = {};
  DELEGATE_PAIRS.forEach(d=>(delegates[d.id]={ m1:"active", m2:"active" }));
  const suites = {}; GROUP_SUITES.forEach(s=>(suites[s.id]=false));
  return { delegates, suites, notes:"" };
}

function delegatePairStatus(gmState, id) {
  const d = gmState.delegates?.[id];
  if (!d) return { m1:"active", m2:"active" };
  if (typeof d === "string") return { m1: d, m2: d }; // backward compat
  return d;
}

function computeInjuryState(baseDice, injury, bloodiedStats, breakingStats) {
  const displayDice = {...baseDice};
  if (injury >= 2) {
    (bloodiedStats||[]).forEach(s=>{ displayDice[s]=Math.max(0,baseDice[s]-1); });
  }
  if (injury >= 3) {
    const bloodiedLevel = (bloodiedStats&&bloodiedStats.length>0) ? Math.max(0,baseDice[bloodiedStats[0]]-1) : null;
    STATS.forEach(s=>{
      if (!(bloodiedStats||[]).includes(s)) {
        if (bloodiedLevel!==null && displayDice[s]>bloodiedLevel) displayDice[s]=bloodiedLevel;
        else if (bloodiedLevel===null) displayDice[s]=Math.max(0,baseDice[s]-1);
      }
    });
  }
  return displayDice;
}

// ── DIE SVG ───────────────────────────────────────────────────
function DieSVG({ sides, size=32, active=false, color=null, onClick }) {
  const s=size,c=s/2,fs=s*0.28;
  const baseColor=color||(active?"#b8860b":"rgba(255,255,255,0.1)");
  const fill=active?(color?color+"22":"rgba(184,134,11,0.18)"):"rgba(255,255,255,0.04)";
  const sw=active?1.5:1;
  const tc=active?baseColor:"rgba(255,255,255,0.15)";
  const shapes={
    4:<polygon points={`${c},${s*.08} ${s*.92},${s*.92} ${s*.08},${s*.92}`} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
    6:<rect x={s*.1} y={s*.1} width={s*.8} height={s*.8} rx={3} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
    8:<polygon points={`${c},${s*.06} ${s*.94},${c} ${c},${s*.94} ${s*.06},${c}`} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
    10:<polygon points={`${c},${s*.06} ${s*.94},${s*.38} ${s*.76},${s*.94} ${s*.24},${s*.94} ${s*.06},${s*.38}`} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
    12:<polygon points={`${c},${s*.06} ${s*.88},${s*.28} ${s*.94},${s*.66} ${s*.62},${s*.94} ${s*.38},${s*.94} ${s*.06},${s*.66} ${s*.12},${s*.28}`} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
    20:<polygon points={`${c},${s*.06} ${s*.97},${s*.38} ${s*.78},${s*.94} ${s*.22},${s*.94} ${s*.03},${s*.38}`} fill={fill} stroke={baseColor} strokeWidth={sw}/>,
  };
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} onClick={active&&onClick?onClick:undefined} style={{ cursor:active&&onClick?"pointer":"default", display:"block", flexShrink:0 }}>
      {shapes[sides]||shapes[4]}
      <text x={c} y={c+fs*.38} textAnchor="middle" fontSize={fs} fontWeight="700" fill={tc} fontFamily="Georgia,serif">{sides}</text>
    </svg>
  );
}

// ── ROLL POPUP ────────────────────────────────────────────────
function RollPopup({ roll, onClose }) {
  const isDisadvantage=roll.disadvantage;
  const isSurge=!isDisadvantage&&roll.result===roll.sides;
  const r2=roll.result2;
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24 }} onClick={onClose}>
      <div style={{ background:"linear-gradient(160deg,#1a0f0a,#0d0805)",border:`2px solid ${isSurge?"#b8860b":isDisadvantage?"#6b1a1a":"#8b1a1a"}`,borderRadius:16,padding:"40px 48px",textAlign:"center",minWidth:220,boxShadow:isSurge?"0 0 40px rgba(184,134,11,0.3)":"none" }} onClick={e=>e.stopPropagation()}>
        <div style={{ fontSize:11,color:"#5a4a3a",letterSpacing:2,marginBottom:8,textTransform:"uppercase" }}>{roll.stat} — d{roll.sides}{isDisadvantage?" (Disadvantage)":""}</div>
        {isDisadvantage?(
          <>
            <div style={{ display:"flex",gap:24,justifyContent:"center",marginBottom:12,alignItems:"center" }}>
              <div><div style={{ fontSize:10,color:"#5a4a3a",marginBottom:4 }}>Roll 1</div><div style={{ fontSize:48,fontWeight:700,color:roll.result<=r2?"#f0e6d3":"#3a2a1a",fontFamily:"Georgia,serif",lineHeight:1 }}>{roll.result}</div></div>
              <div style={{ fontSize:20,color:"#3a2a1a" }}>vs</div>
              <div><div style={{ fontSize:10,color:"#5a4a3a",marginBottom:4 }}>Roll 2</div><div style={{ fontSize:48,fontWeight:700,color:r2<=roll.result?"#f0e6d3":"#3a2a1a",fontFamily:"Georgia,serif",lineHeight:1 }}>{r2}</div></div>
            </div>
            <div style={{ fontSize:14,color:"#8b1a1a",fontWeight:700,marginBottom:8 }}>Taking the lower: {Math.min(roll.result,r2)}</div>
          </>
        ):(
          <div style={{ fontSize:72,fontWeight:700,color:isSurge?"#b8860b":"#f0e6d3",fontFamily:"Georgia,serif",lineHeight:1,marginBottom:8 }}>{roll.result}</div>
        )}
        {isSurge&&<div style={{ color:"#b8860b",fontWeight:700,fontSize:16,marginBottom:12 }}>SURGE — Roll the next die and add it!</div>}
        {!isSurge&&!isDisadvantage&&<div style={{ color:"#5a4a3a",fontSize:13,marginBottom:12 }}>{roll.result>=Math.ceil(roll.sides*.75)?"Strong roll.":roll.result<=Math.ceil(roll.sides*.25)?"Rough.":"\u00a0"}</div>}
        <button onClick={onClose} style={{ marginTop:8,background:"rgba(139,26,26,0.3)",border:"1px solid #8b1a1a",borderRadius:8,color:"#f0e6d3",fontSize:13,fontWeight:700,padding:"10px 28px",cursor:"pointer",letterSpacing:1 }}>Close</button>
      </div>
    </div>
  );
}

// ── TIE POPUP ─────────────────────────────────────────────────
function TiePopup({ title, message, candidates, count, onConfirm }) {
  const [selected,setSelected]=useState([]);
  function toggle(stat){ if(selected.includes(stat))setSelected(selected.filter(s=>s!==stat)); else if(selected.length<count)setSelected([...selected,stat]); }
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:24 }}>
      <div style={{ background:"#1a0f0a",border:"1px solid #8b1a1a",borderRadius:12,padding:28,width:"100%",maxWidth:380 }}>
        <div style={{ fontSize:14,fontWeight:700,color:"#f0e6d3",fontFamily:"Georgia,serif",marginBottom:8 }}>{title}</div>
        <div style={{ fontSize:12,color:"#9a8a7a",marginBottom:20,lineHeight:1.5 }}>{message}</div>
        <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:20 }}>
          {candidates.map(stat=>(
            <button key={stat} onClick={()=>toggle(stat)} style={{ background:selected.includes(stat)?"rgba(139,26,26,0.4)":"rgba(255,255,255,0.03)",border:`1px solid ${selected.includes(stat)?"#8b1a1a":"rgba(255,255,255,0.1)"}`,borderRadius:6,color:selected.includes(stat)?"#f0e6d3":"#9a8a7a",fontSize:13,fontWeight:700,padding:"8px 16px",cursor:"pointer",textAlign:"left" }}>
              {stat} {selected.includes(stat)?"✓":""}
            </button>
          ))}
        </div>
        <div style={{ fontSize:11,color:"#5a4a3a",marginBottom:16 }}>Select {count} — {selected.length} chosen</div>
        <button onClick={()=>selected.length===count&&onConfirm(selected)} disabled={selected.length!==count} style={{ width:"100%",background:selected.length===count?"#8b1a1a":"rgba(255,255,255,0.04)",border:"none",borderRadius:6,color:selected.length===count?"#f0e6d3":"#3a2a1a",fontSize:13,fontWeight:700,padding:10,cursor:selected.length===count?"pointer":"not-allowed",letterSpacing:1 }}>Confirm</button>
      </div>
    </div>
  );
}

// ── DELEGATES VIEW (player) ───────────────────────────────────
function DelegatesView({ gmState, players }) {
  // 6 slots in sector order. Each NPC slot maps to a DELEGATE_PAIRS id.
  const allSlots = [
    { npcId:"influencers",  continent:"Solis",      sector:"Sector One",   isPC:false },
    { npcId:"winners_kids", continent:"Greyhollow", sector:"Sector Two",   isPC:false },
    { npcId:"merra",        continent:"Merra",      sector:"Sector Three", isPC:true  },
    { npcId:"athletes",     continent:"Ashpeak",    sector:"Sector Four",  isPC:false },
    { npcId:"wildcards",    continent:"Patchor",    sector:"Sector Five",  isPC:false },
    { npcId:"normals",      continent:"Norwick",    sector:"Sector Six",   isPC:false },
  ];

  // Build lookup by id for quick access
  const pairById = {};
  DELEGATE_PAIRS.forEach(p => { pairById[p.id] = p; });

  return (
    <div>
      <img src={WORLD_MAP_SRC} alt="World Map" style={{ width:"100%",borderRadius:8,border:"1px solid rgba(184,134,11,0.3)",display:"block",marginBottom:20 }}/>
      <div style={{ fontSize:12,fontWeight:700,color:"#b8860b",letterSpacing:2,textTransform:"uppercase",textAlign:"center",marginBottom:14 }}>Delegates</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        {allSlots.map(slot => {
          const pair = slot.isPC ? null : pairById[slot.npcId];
          const status = slot.isPC ? {m1:"active",m2:"active"} : delegatePairStatus(gmState, slot.npcId);
          const [m1name, m2name] = slot.isPC
            ? [players?.[0]?.name||"Delegate 1", players?.[1]?.name||"Delegate 2"]
            : (pair?.members||"& ").split(" & ");
          const bothOut = !slot.isPC && status.m1!=="active" && status.m2!=="active";

          return (
            <div key={slot.npcId} style={{ display:"flex", flexDirection:"column", alignItems:"center", opacity:bothOut?0.5:1, transition:"all 0.3s" }}>
              {/* Continent */}
              <div style={{ fontSize:13, fontWeight:700, color:slot.isPC?"#b8860b":"#f0e6d3", fontFamily:"Georgia,serif", textAlign:"center", marginBottom:2 }}>{slot.continent}</div>
              {/* Sector */}
              <div style={{ fontSize:9, color:"#5a4a3a", letterSpacing:1, textTransform:"uppercase", textAlign:"center", marginBottom:8 }}>{slot.sector}</div>
              {/* Portrait */}
              <div style={{ width:"100%", aspectRatio:"16/10", borderRadius:8, overflow:"hidden", border:`1px solid ${slot.isPC?"rgba(184,134,11,0.4)":"rgba(255,255,255,0.1)"}`, background:"rgba(0,0,0,0.3)", position:"relative", marginBottom:8 }}>
                {pair?.img ? (
                  <div style={{ position:"relative",width:"100%",height:"100%" }}>
                    <img src={pair.img} alt={slot.continent} style={{ width:"100%",height:"100%",objectFit:"cover",display:"block" }}/>
                    {status.m1!=="active" && <div style={{ position:"absolute",top:0,left:0,width:"50%",height:"100%",background:"rgba(0,0,0,0.72)",display:"flex",alignItems:"center",justifyContent:"center" }}><div style={{ fontSize:7,color:"#cc3333",fontWeight:700,letterSpacing:1,textTransform:"uppercase" }}>Out</div></div>}
                    {status.m2!=="active" && <div style={{ position:"absolute",top:0,right:0,width:"50%",height:"100%",background:"rgba(0,0,0,0.72)",display:"flex",alignItems:"center",justifyContent:"center" }}><div style={{ fontSize:7,color:"#cc3333",fontWeight:700,letterSpacing:1,textTransform:"uppercase" }}>Out</div></div>}
                  </div>
                ) : (
                  <div style={{ width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",minHeight:80 }}>
                    <div style={{ fontSize:10,color:"#b8860b",textAlign:"center",padding:8,lineHeight:1.6 }}>Your delegates</div>
                  </div>
                )}
              </div>
              {/* Names with per-member strikethrough */}
              <div style={{ textAlign:"center", fontFamily:"Georgia,serif", lineHeight:1.6 }}>
                <span style={{ fontSize:11, color:slot.isPC?"#b8860b":(status.m1==="active"?"#f0e6d3":"#5a4a3a"), textDecoration:(!slot.isPC&&status.m1!=="active")?"line-through":"none" }}>{m1name}</span>
                <span style={{ fontSize:11, color:"#3a2a1a" }}> & </span>
                <span style={{ fontSize:11, color:slot.isPC?"#b8860b":(status.m2==="active"?"#f0e6d3":"#5a4a3a"), textDecoration:(!slot.isPC&&status.m2!=="active")?"line-through":"none" }}>{m2name}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        Abilities cost <span style={{ color:"#b8860b",fontWeight:700 }}>3 Views</span> each. You have <span style={{ color:"#b8860b",fontWeight:700 }}>{player.views}</span> tokens.
      </div>
      {STATS.map(stat=>(
        <div key={stat} style={{ marginBottom:20 }}>
          <div style={SL}>{stat}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
            {ABILITIES.filter(a=>a.stat===stat).map(a=>{

                <div key={a.id} style={{ background:owned?"rgba(184,134,11,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${owned?"rgba(184,134,11,0.28)":"rgba(255,255,255,0.06)"}`,borderRadius:6,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10 }}>

                    <div style={{ fontSize:11,color:"#9a8a7a",marginTop:2,lineHeight:1.4 }}>{a.desc}</div>

                  }

        <div style={{ fontSize:11,color:"#5a4a3a",marginBottom:16,lineHeight:1.6 }}>Unlocked as all players reach the required die level.</div>
        <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
          {GROUP_SUITES.map(s=>{
            const unlocked=gmState.suites?.[s.id];
            return (
              <div key={s.id} style={{ border:`1px solid ${unlocked?"rgba(184,134,11,0.35)":"rgba(255,255,255,0.07)"}`,borderRadius:8,padding:14,background:unlocked?"rgba(184,134,11,0.07)":"rgba(0,0,0,0.25)",opacity:unlocked?1:0.5 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:unlocked?8:0 }}>
                  <div>
                    <span style={{ fontWeight:700,color:unlocked?"#b8860b":"#5a4a3a",fontSize:13,fontFamily:"Georgia,serif" }}>{unlocked?s.name:"???"}</span>
                    <span style={{ fontSize:10,color:"#5a4a3a",marginLeft:10 }}>d{s.die}</span>

                  <span style={{ fontSize:10,fontWeight:700,color:unlocked?"#b8860b":"#3a2a1a",letterSpacing:1 }}>{unlocked?"UNLOCKED":"LOCKED"}</span>
                </div>
                {unlocked&&<div style={{ fontSize:11,color:"#9a8a7a",lineHeight:1.5 }}>{s.desc}</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── INVENTORY ─────────────────────────────────────────────────
function InventoryTab({ player, onUpdate }) {
  const [newName,setNewName]=useState("");
  const [newNote,setNewNote]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [editNote,setEditNote]=useState("");
  function addItem(){ if(!newName.trim())return; onUpdate({...player,inventory:[...(player.inventory||[]),{id:Date.now(),name:newName.trim(),note:newNote.trim()}]}); setNewName(""); setNewNote(""); }
  function removeItem(id){ onUpdate({...player,inventory:player.inventory.filter(i=>i.id!==id)}); }
  function saveEdit(id){ onUpdate({...player,inventory:player.inventory.map(i=>i.id===id?{...i,note:editNote}:i)}); setEditingId(null); }
  return (
    <div>
      <div style={SL}>Inventory</div>
      <div style={{ background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:14,marginBottom:16 }}>
        <div style={ML}>Add Item</div>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="Item name..." style={{...TI,marginBottom:8}}/>
        <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Notes..." rows={2} style={{...TI,resize:"vertical",fontFamily:"Georgia,serif"}}/>
        <button onClick={addItem} disabled={!newName.trim()} style={{ marginTop:8,background:newName.trim()?"rgba(139,26,26,0.3)":"rgba(255,255,255,0.03)",border:`1px solid ${newName.trim()?"#8b1a1a":"rgba(255,255,255,0.07)"}`,borderRadius:6,color:newName.trim()?"#f0e6d3":"#3a2a1a",fontSize:11,fontWeight:700,padding:"6px 14px",cursor:newName.trim()?"pointer":"not-allowed",letterSpacing:1 }}>Add</button>
      </div>
      {(!player.inventory||player.inventory.length===0)&&<div style={{ color:"#3a2a1a",fontSize:12,fontStyle:"italic",textAlign:"center",padding:"20px 0" }}>No items yet.</div>}
      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
        {(player.inventory||[]).map(item=>(
          <div key={item.id} style={{ background:"rgba(184,134,11,0.06)",border:"1px solid rgba(184,134,11,0.18)",borderRadius:8,padding:12 }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:item.note||editingId===item.id?6:0 }}>
              <span style={{ fontWeight:700,color:"#b8860b",fontSize:14,fontFamily:"Georgia,serif" }}>{item.name}</span>
              <div style={{ display:"flex",gap:8 }}>
                <button onClick={()=>{setEditingId(item.id);setEditNote(item.note);}} style={GB}>Edit</button>
                <button onClick={()=>removeItem(item.id)} style={{...GB,color:"#8b1a1a"}}>Remove</button>
              </div>
            </div>
            {editingId===item.id?(
              <div>
                <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} rows={2} style={{...TI,resize:"vertical",fontFamily:"Georgia,serif",marginBottom:6}}/>
                <div style={{ display:"flex",gap:6 }}>
                  <button onClick={()=>saveEdit(item.id)} style={{...GB,color:"#b8860b"}}>Save</button>
                  <button onClick={()=>setEditingId(null)} style={GB}>Cancel</button>
                </div>
              </div>
            ):(item.note&&<div style={{ fontSize:12,color:"#9a8a7a",lineHeight:1.5 }}>{item.note}</div>)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PLAY TAB ──────────────────────────────────────────────────
function PlayTab({ player, onUpdate, onRoll }) {
  const [tiePopup,setTiePopup]=useState(null);
  function updateField(f,v){ onUpdate({...player,[f]:v}); }
  function advanceStat(stat,dir){ const newVal=Math.max(0,Math.min(5,player.baseDice[stat]+dir)); onUpdate({...player,baseDice:{...player.baseDice,[stat]:newVal}}); }
  const displayDice=computeInjuryState(player.baseDice,player.injury,player.bloodiedStats,player.breakingStats);
  const redStats=new Set(player.bloodiedStats||[]);
  const darkRedStats=new Set(player.breakingStats||[]);
  function getDieColor(stat){ if(darkRedStats.has(stat))return "#6b0a0a"; if(redStats.has(stat))return "#cc3333"; return null; }
  function handleRollStat(stat){
    const dieIdx=displayDice[stat];
    const sides=DICE_SEQUENCE[dieIdx];
    const isDisadvantage=darkRedStats.has(stat);
    const dt=new Date();
    const datetime=dt.toLocaleDateString()+" "+dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    if(isDisadvantage){
      const r1=Math.floor(Math.random()*sides)+1;
      const r2=Math.floor(Math.random()*sides)+1;
      onRoll({stat,sides,result:Math.min(r1,r2),result2:Math.max(r1,r2),disadvantage:true,isSurge:false,id:Date.now()+Math.random(),datetime});
    } else {
      const result=Math.floor(Math.random()*sides)+1;
      onRoll({stat,sides,result,isSurge:result===sides,disadvantage:false,id:Date.now()+Math.random(),datetime});
    }
  }
  function handleInjuryChange(newInjury){
    if(newInjury<=1){ onUpdate({...player,injury:newInjury,bloodiedStats:[],breakingStats:[]}); return; }
    if(newInjury===2&&player.injury<2){
      const sorted=STATS.map(s=>({s,val:player.baseDice[s]})).sort((a,b)=>a.val-b.val);
      const lowestVal=sorted[2].val;
      const tied=sorted.filter(x=>x.val===lowestVal).map(x=>x.s);
      const already=sorted.filter(x=>x.val<lowestVal).map(x=>x.s);
      const needed=3-already.length;
      if(tied.length>needed){
        setTiePopup({title:"Bloodied — Choose Stats",message:`${needed} stat${needed>1?"s":""} tied at lowest. Choose which ${needed} lose a die level.`,candidates:tied,count:needed,onConfirm:(chosen)=>{setTiePopup(null);onUpdate({...player,injury:2,bloodiedStats:[...already,...chosen],breakingStats:[]});}});
      } else { onUpdate({...player,injury:2,bloodiedStats:[...already,...tied].slice(0,3),breakingStats:[]}); }
      return;
    }
    if(newInjury===3&&player.injury===2){
      const bloodiedStats=player.bloodiedStats||[];
      const bloodiedLevel=bloodiedStats.length>0?Math.max(0,player.baseDice[bloodiedStats[0]]-1):0;
      const afterBreak={};
      STATS.forEach(s=>{ afterBreak[s]=bloodiedStats.includes(s)?Math.max(0,player.baseDice[s]-1):Math.min(player.baseDice[s],bloodiedLevel); });
      const sorted=STATS.map(s=>({s,val:afterBreak[s]})).sort((a,b)=>a.val-b.val);
      const lowestVal=sorted[2].val;
      const tied=sorted.filter(x=>x.val===lowestVal).map(x=>x.s);
      const already=sorted.filter(x=>x.val<lowestVal).map(x=>x.s);
      const needed=3-already.length;
      const apply=(breaking)=>onUpdate({...player,injury:3,bloodiedStats,breakingStats:breaking,views:player.views+10});
      if(tied.length>needed){
        setTiePopup({title:"Breaking — Choose Disadvantage",message:`${needed} stat${needed>1?"s":""} tied for lowest. Choose which ${needed} roll at disadvantage.`,candidates:tied,count:needed,onConfirm:(chosen)=>{setTiePopup(null);apply([...already,...chosen]);}});
      } else { apply([...already,...tied].slice(0,3)); }
      return;
    }
    onUpdate({...player,injury:newInjury});
  }
  const ownedByStat={};
  STATS.forEach(stat=>{ ownedByStat[stat]=ABILITIES.filter(a=>a.stat===stat&&player.abilities[a.id]); });
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      {tiePopup&&<TiePopup {...tiePopup}/>}
      {/* Portrait + Identity */}
      <div style={{ display:"flex",gap:14,alignItems:"flex-start" }}>
        <div style={{ width:80,height:80,borderRadius:8,overflow:"hidden",border:"1px solid rgba(184,134,11,0.3)",background:"rgba(255,255,255,0.03)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center" }}>
          {player.photo?<img src={player.photo} alt="Character" style={{ width:"100%",height:"100%",objectFit:"cover" }}/>:<div style={{ fontSize:9,color:"#3a2a1a",textAlign:"center",padding:8,lineHeight:1.4 }}>No portrait</div>}
        </div>
        <div style={{ flex:1,display:"flex",flexDirection:"column",gap:8 }}>
          <input value={player.name} onChange={e=>updateField("name",e.target.value)} style={inlineInput({fontSize:20,fontWeight:700,fontFamily:"Georgia,serif",color:"#f0e6d3"})} placeholder="Delegate Name"/>
          <div style={{ fontSize:11,color:"#5a4a3a",paddingTop:4 }}>Merra — Sector Three</div>
        </div>
      </div>
      {/* Tokens + Injury */}
      <div style={{ display:"flex",gap:16,alignItems:"flex-start" }}>
        <div>
          <div style={ML}>Views</div>
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <button onClick={()=>updateField("views",Math.max(0,player.views-1))} style={CB}>-</button>
            <div style={{ fontSize:28,fontWeight:700,color:"#b8860b",minWidth:36,textAlign:"center",fontFamily:"Georgia,serif" }}>{player.views}</div>
            <button onClick={()=>updateField("views",player.views+1)} style={CB}>+</button>
          </div>
        </div>
        <div style={{ flex:1 }}>
          <div style={ML}>Injury</div>
          <div style={{ display:"flex",gap:4 }}>
            {INJURY_LEVELS.map((lvl,i)=>(
              <button key={lvl} onClick={()=>handleInjuryChange(i)} style={{ flex:1,padding:"5px 2px",fontSize:9,fontWeight:player.injury===i?700:400,background:player.injury===i?INJURY_COLORS[i]:"rgba(255,255,255,0.03)",border:`1px solid ${player.injury===i?INJURY_COLORS[i]:"rgba(255,255,255,0.08)"}`,borderRadius:4,color:player.injury===i?"#f0e6d3":"#3a2a1a",cursor:"pointer" }}>{lvl}</button>
            ))}
          </div>
          {player.injury===2&&<div style={{ fontSize:9,color:"#cc3333",marginTop:4 }}>Failures grant 2 Views</div>}
          {player.injury===3&&<div style={{ fontSize:9,color:"#8b1a1a",marginTop:4 }}>+10 Views · Lowest 3 at disadvantage · Failures grant 2 Views</div>}
        </div>
      </div>
      {/* Stats */}
      <div>
        <div style={SL}>Stats</div>
        <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
          {STATS.map(stat=>{
            const dieIdx=displayDice[stat];
            const dieColor=getDieColor(stat);
            const isRed=redStats.has(stat);
            const isDarkRed=darkRedStats.has(stat);
            const statAbilities=ownedByStat[stat];
            return (
              <div key={stat} style={{ background:"rgba(255,255,255,0.02)",border:`1px solid ${isDarkRed?"rgba(107,10,10,0.4)":isRed?"rgba(204,51,51,0.25)":"rgba(255,255,255,0.06)"}`,borderRadius:8,padding:"10px 12px" }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                  <div>
                    <span style={{ fontWeight:700,color:isDarkRed?"#cc3333":isRed?"#e06060":"#f0e6d3",fontSize:14,fontFamily:"Georgia,serif" }}>{stat}</span>
                    <span style={{ fontSize:10,color:"#3a2a1a",marginLeft:8 }}>{STAT_DESC[stat]}</span>
                    {isDarkRed&&<span style={{ fontSize:9,color:"#8b1a1a",marginLeft:8 }}>disadvantage</span>}
                    {isRed&&!isDarkRed&&<span style={{ fontSize:9,color:"#cc3333",marginLeft:8 }}>injured</span>}
                  </div>
                  <div style={{ display:"flex",gap:3 }}>
                    <button onClick={()=>advanceStat(stat,-1)} style={TB}>-</button>
                    <button onClick={()=>advanceStat(stat,1)} style={TB}>+</button>
                  </div>
                </div>
                <div style={{ display:"flex",gap:5,marginBottom:statAbilities.length>0?10:0 }}>
                  {DICE_SEQUENCE.map((d,i)=>(
                    <div key={d} onClick={()=>{if(i===dieIdx)handleRollStat(stat);}}>
                      <DieSVG sides={d} size={32} active={i===dieIdx} color={i===dieIdx?dieColor:null} onClick={()=>{}}/>
                    </div>
                  ))}
                </div>
                {statAbilities.length>0&&(
                  <div style={{ display:"flex",flexDirection:"column",gap:4,borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:8 }}>
                    {statAbilities.map(a=>(
                      <div key={a.id} style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                        <span style={{ fontSize:10,color:"#b8860b",fontWeight:700,minWidth:80 }}>{a.name}</span>
                        <span style={{ fontSize:10,color:"#5a4a3a",lineHeight:1.4 }}>{a.desc}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── PLAYER VIEW ───────────────────────────────────────────────
function PlayerView({ playerId, player, onUpdate, gmState, notifications, players }) {
  const [tab,setTab]=useState("play");
  const [rollPopup,setRollPopup]=useState(null);
  const [rollHistory,setRollHistory]=useState([]);
  function handleRoll(roll){ setRollPopup(roll); setRollHistory(prev=>[roll,...prev].slice(0,100)); }
  const tabs=[
    {id:"play",label:"Play"},
    {id:"items",label:"Items"},
    {id:"abilities",label:"Abilities"},
    {id:"delegates",label:"Delegates"},
    {id:"alerts",label:"Alerts"},
    {id:"rolls",label:"Rolls"},
  ];
  return (
    <div style={{ maxWidth:480,margin:"0 auto",paddingBottom:60 }}>
      {rollPopup&&<RollPopup roll={rollPopup} onClose={()=>setRollPopup(null)}/>}
      <div style={{ padding:"16px 20px 0",borderBottom:"1px solid rgba(184,134,11,0.15)" }}>
        <div style={{ fontSize:9,color:"#b8860b",letterSpacing:3,fontWeight:700,marginBottom:10 }}>THE GLOBAL SUMMONS</div>
        <TabBar tabs={tabs} active={tab} onSelect={setTab}/>
      </div>
      <div style={{ padding:20 }}>
        {tab==="play"&&<PlayTab player={player} onUpdate={onUpdate} onRoll={handleRoll}/>}
        {tab==="items"&&<InventoryTab player={player} onUpdate={onUpdate}/>}
        {tab==="abilities"&&<AbilitiesTab player={player} onUpdate={onUpdate} gmState={gmState}/>}
        {tab==="delegates"&&<DelegatesView gmState={gmState} players={players}/>}
        {tab==="alerts"&&<NotificationFeed notifications={notifications} playerId={playerId}/>}
        {tab==="rolls"&&<RollHistory history={rollHistory}/>}
      </div>
    </div>
  );
}

// ── GM DICE ───────────────────────────────────────────────────
function GMDiceRoller() {
  const [history,setHistory]=useState([]);
  const [popup,setPopup]=useState(null);
  function roll(sides){
    const result=Math.floor(Math.random()*sides)+1;
    const dt=new Date();
    const entry={id:Date.now(),stat:"GM",sides,result,isSurge:result===sides,disadvantage:false,datetime:dt.toLocaleDateString()+" "+dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})};
    setHistory(prev=>[entry,...prev].slice(0,30));
    setPopup(entry);
  }
  return (
    <div>
      {popup&&<RollPopup roll={popup} onClose={()=>setPopup(null)}/>}
      <div style={SL}>Dice Roller</div>
      <div style={{ display:"flex",gap:12,flexWrap:"wrap",marginBottom:20,justifyContent:"center" }}>
        {DICE_SEQUENCE.map(d=>(<div key={d} onClick={()=>roll(d)} style={{ cursor:"pointer" }}><DieSVG sides={d} size={52} active={true}/></div>))}
      </div>
      <RollHistory history={history}/>
    </div>
  );
}

// ── GM DELEGATES ──────────────────────────────────────────────
function GMDelegates({ gmState, onUpdateGM }) {
  function toggleMember(id, member) {
    const cur = delegatePairStatus(gmState, id);
    const next = { ...cur, [member]: cur[member]==="active" ? "eliminated" : "active" };
    onUpdateGM({...gmState, delegates:{...gmState.delegates, [id]: next}});
  }
  return (
    <div>
      <div style={SL}>Delegate Pairs</div>
      <div style={{ fontSize:11,color:"#5a4a3a",marginBottom:16 }}>Eliminate individual delegates. Their half of the portrait greys out on the player side.</div>
      <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
        {DELEGATE_PAIRS.map(d=>{
          const status = delegatePairStatus(gmState, d.id);
          const [m1name, m2name] = d.members.split(" & ");
          const bothOut = status.m1!=="active" && status.m2!=="active";
          return (
            <div key={d.id} style={{ borderRadius:10,overflow:"hidden",border:`1px solid ${bothOut?"rgba(139,26,26,0.3)":"rgba(255,255,255,0.08)"}`,transition:"all 0.3s" }}>
              <div style={{ display:"flex" }}>
                {/* Portrait with split overlays */}
                <div style={{ width:120,flexShrink:0,position:"relative",minHeight:90 }}>
                  <img src={d.img} alt={d.name} style={{ width:"100%",height:"100%",objectFit:"cover",display:"block" }}/>
                  {status.m1!=="active"&&<div style={{ position:"absolute",top:0,left:0,width:"50%",height:"100%",background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center" }}><div style={{ fontSize:7,color:"#cc3333",fontWeight:700,letterSpacing:1,textTransform:"uppercase",writingMode:"vertical-rl",transform:"rotate(180deg)" }}>Out</div></div>}
                  {status.m2!=="active"&&<div style={{ position:"absolute",top:0,right:0,width:"50%",height:"100%",background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center" }}><div style={{ fontSize:7,color:"#cc3333",fontWeight:700,letterSpacing:1,textTransform:"uppercase",writingMode:"vertical-rl",transform:"rotate(180deg)" }}>Out</div></div>}
                </div>
                {/* Info + buttons */}

function SaveLoad({ state, onLoad }) {
  const [showLoad,setShowLoad]=useState(false);
  const [loadText,setLoadText]=useState("");
  const [copied,setCopied]=useState(false);
  function copy(){ navigator.clipboard.writeText(JSON.stringify(state)).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}); }
  function load(){ try{onLoad(JSON.parse(loadText));setShowLoad(false);setLoadText("");}catch{alert("Invalid save data.");} }
  return (
    <div style={{ padding:"8px 20px",borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:8 }}>
      <button onClick={copy} style={{...SB,flex:1}}>{copied?"Copied!":"Save State"}</button>
      <button onClick={()=>setShowLoad(!showLoad)} style={{...SB,flex:1}}>Load State</button>
      {showLoad&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:24 }}>
          <div style={{ background:"#1a0f0a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:20,width:"100%",maxWidth:400 }}>
            <div style={{ fontWeight:700,color:"#f0e6d3",marginBottom:12,fontFamily:"Georgia,serif" }}>Load Save State</div>
            <textarea value={loadText} onChange={e=>setLoadText(e.target.value)} placeholder="Paste save data here..." rows={6} style={{ width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#f0e6d3",fontSize:12,padding:10,boxSizing:"border-box",resize:"none" }}/>
            <div style={{ display:"flex",gap:8,marginTop:10 }}>
              <button onClick={load} style={{...SB,flex:1,background:"rgba(139,26,26,0.35)"}}>Load</button>
              <button onClick={()=>setShowLoad(false)} style={{...SB,flex:1}}>Cancel</button>

}

// ── FIRESTORE-BACKED APP ──────────────────────────────────────
const SESSION_DOC_PATH = ["sessions", "main"]; // single shared session document

function App() {
  const [view, setView] = useState(null);
  const [players, setPlayers] = useState([makeDefaultPlayer(1), makeDefaultPlayer(2)]);
  const [gmState, setGmState] = useState(makeDefaultGMState());
  const [notifications, setNotifications] = useState([]);
  const [connected, setConnected] = useState(false);
  const [loading, setLoading] = useState(true);
  const docRef = window._firestoreDocRef;
  const isFirstLoad = useRef(true);
  const writingRef = useRef(false);

  // Subscribe to Firestore in real time
  useEffect(() => {
    if (!docRef) { setLoading(false); return; }
    const unsub = window._firestoreOnSnapshot(docRef, (snap) => {
      setConnected(true);
      if (snap.exists()) {
        const data = snap.data();
        if (data.players) {
          setPlayers(data.players.map(p => ({
            ...makeDefaultPlayer(1), ...p,
            baseDice: p.baseDice || makeDefaultPlayer(1).baseDice,
            bloodiedStats: p.bloodiedStats || [],
            breakingStats: p.breakingStats || [],
            abilities: p.abilities || makeDefaultPlayer(1).abilities,
            inventory: p.inventory || [],
          })));
        }
        if (data.gmState) {
          const newGM = { ...makeDefaultGMState(), ...data.gmState };
          const dels = newGM.delegates || {};
          DELEGATE_PAIRS.forEach(d => {
            if (typeof dels[d.id] === "string") dels[d.id] = { m1: dels[d.id], m2: dels[d.id] };
            else if (!dels[d.id]) dels[d.id] = { m1: "active", m2: "active" };
          });
          newGM.delegates = dels;
          setGmState(newGM);
        }
        if (data.notifications) setNotifications(data.notifications);
      } else {
        // No doc yet — initialize it
        pushToFirestore({
          players: [makeDefaultPlayer(1), makeDefaultPlayer(2)],
          gmState: makeDefaultGMState(),
          notifications: [],
        });
      }
      setLoading(false);
      isFirstLoad.current = false;
    }, (err) => {
      console.error("Firestore error:", err);
      setConnected(false);
      setLoading(false);
    });
    return () => unsub && unsub();
  }, []);

  function pushToFirestore(partial) {
    if (!docRef) return;
    window._firestoreSetDoc(docRef, partial, { merge: true }).catch(e => console.error("Write error:", e));
  }

  function updatePlayer(idx, updated) {
    setPlayers(prev => {
      const n = [...prev];
      n[idx] = updated;
      pushToFirestore({ players: n });
      return n;
    });
  }

  function updateGmState(updated) {
    setGmState(updated);
    pushToFirestore({ gmState: updated });
  }

  function sendNotification({ message, to }) {
    const ts = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    setNotifications(prev => {
      const next = [{ id: Date.now(), message, to, timestamp: ts }, ...prev].slice(0, 200);
      pushToFirestore({ notifications: next });
      return next;
    });
  }

  function loadState(state) {
    if (state.players) {
      const newPlayers = state.players.map(p => ({
        ...makeDefaultPlayer(1), ...p,
        baseDice: p.baseDice || p.stats || makeDefaultPlayer(1).baseDice,
        bloodiedStats: p.bloodiedStats || [],
        breakingStats: p.breakingStats || [],
      }));
      setPlayers(newPlayers);
      pushToFirestore({ players: newPlayers });
    }
    if (state.gmState) {
      const newGM = { ...makeDefaultGMState(), ...state.gmState };
      const dels = newGM.delegates || {};
      DELEGATE_PAIRS.forEach(d => {
        if (typeof dels[d.id] === "string") dels[d.id] = { m1: dels[d.id], m2: dels[d.id] };
        else if (!dels[d.id]) dels[d.id] = { m1: "active", m2: "active" };
      });
      newGM.delegates = dels;
      setGmState(newGM);
      pushToFirestore({ gmState: newGM });
    }
    if (state.notifications) {
      setNotifications(state.notifications);
      pushToFirestore({ notifications: state.notifications });
    }
  }

  const bg = { minHeight: "100vh", background: "linear-gradient(160deg,#0d0805 0%,#1a0f0a 50%,#0d0508 100%)", color: "#f0e6d3", fontFamily: "Georgia,serif" };

  if (loading) {
    return (
      <div style={{ ...bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:11, color:"#b8860b", letterSpacing:3, textTransform:"uppercase", marginBottom:10 }}>Connecting</div>
          <div style={{ fontSize:13, color:"#5a4a3a" }}>The Continental Assembly is establishing contact...</div>
        </div>
      </div>
    );
  }

  if (!view) return <div style={bg}><LoginScreen onSelect={setView}/></div>;

  return (
    <div style={bg}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(0,0,0,0.25)" }}>
        <div style={{ fontSize:9,color:"#2a1a0a",letterSpacing:2,textTransform:"uppercase",display:"flex",alignItems:"center",gap:8 }}>
          Global Summons Delegates App
          <span style={{ width:6,height:6,borderRadius:"50%",background:connected?"#2d7a2d":"#7a2d2d",display:"inline-block" }} title={connected?"Live":"Offline"}></span>
        </div>
        <button onClick={()=>setView(null)} style={{ background:"none",border:"none",color:"#2a1a0a",fontSize:10,cursor:"pointer",letterSpacing:1 }}>Switch View</button>
      </div>
      {view==="player1"&&<PlayerView playerId="player1" player={players[0]} onUpdate={p=>updatePlayer(0,p)} gmState={gmState} notifications={notifications} players={players}/>}
      {view==="player2"&&<PlayerView playerId="player2" player={players[1]} onUpdate={p=>updatePlayer(1,p)} gmState={gmState} notifications={notifications} players={players}/>}
      {view==="gm"&&(
        <>
          <GMView players={players} onUpdatePlayer={updatePlayer} gmState={gmState} onUpdateGM={updateGmState} notifications={notifications} onSendNotification={sendNotification}/>
          <SaveLoad state={{players,gmState,notifications}} onLoad={loadState}/>
        </>
      )}
    </div>
  );
}


function boot() {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
}

if (window._firebaseReady) {
  boot();
} else {
  window.addEventListener('firebase-ready', boot);
  setTimeout(function() {
    if (!document.getElementById('root').hasChildNodes()) boot();
  }, 2000);
}
</script>

<script>
(function() {
  var source = document.getElementById('app-source').textContent;
  try {
    var output = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
    var script = document.createElement('script');
    script.textContent = output;
    document.body.appendChild(script);
  } catch (e) {
    document.getElementById('root').innerHTML =
      '<div style="padding:40px;color:#f0e6d3;font-family:Georgia,serif;">' +
      '<h2 style="color:#cc3333;">Something went wrong loading the app</h2>' +
      '<pre style="white-space:pre-wrap;color:#9a8a7a;font-size:13px;">' + e.message + '</pre></div>';
    console.error('Babel transform failed:', e);
  }
})();
</script>
</body>
</html>
